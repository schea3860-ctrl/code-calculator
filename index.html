<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="../css/calculator.css">
</head>
<body>
        <h1>ម៉ាសុីនគណនាឆ្លាតវៃ</h1>
    <div class="Calculator">
        <div class="button">
                <input type="text" id="screen">
            <button onclick="addvalue('+')">+</button>
            <button onclick="addvalue('-')">-</button>
            <button onclick="addvalue('*')">X</button>
            <button onclick="addvalue('/')">/</button>
            <button onclick="addvalue('%')">%</button>
            <button onclick="addvalue('.')">.</button>
            
            <button onclick="ClearScreen()">C</button>
            <button onclick="DeleteScreen()">D</button>

            <button onclick="addvalue('7')">7</button>
            <button onclick="addvalue('8')">8</button>
            <button onclick="addvalue('9')">9</button>

            <button onclick="addvalue('4')">4</button>
            <button onclick="addvalue('5')">5</button>
            <button onclick="addvalue('6')">6</button>

            <button onclick="addvalue('1')">1</button>
            <button onclick="addvalue('2')">2</button>
            <button onclick="addvalue('3')">3</button>
                            
            <button onclick="addvalue('0')">0</button>
            <button onclick="addvalue('00')">00</button>
            <button onclick="addvalue('000')">000</button>
            <button onclick="calculator()">=</button>
        </div>
    </div>
    <button onclick="MeMe()" id="me">កុំចុច</button>
    <h1 id="meme"></h1>





    <script src="../javascript/calculator.js"></script>
</body>
</html>
